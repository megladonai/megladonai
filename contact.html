<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Megladon AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #060B1A; --bg-deep: #030611; --panel: #0D1730; --panel-border: #1B2A4E;
    --teal: #2BE0C4; --teal-dim: rgba(43,224,196,0.14); --bone: #E9E4D6;
    --text: #EAF0F4; --text-muted: #7C8AAC; --sidebar-w: 72px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body{ background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
  h1{ font-family: 'Bricolage Grotesque', sans-serif; letter-spacing: -0.02em; }
  .mono{ font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.06em; }
  a{ color: inherit; text-decoration: none; }

  .sidebar{
    position: fixed; top:0; left:0; bottom:0; width: var(--sidebar-w);
    background: var(--bg-deep); border-right: 1px solid var(--panel-border);
    display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    padding: 20px 0; z-index: 60;
  }
  .side-logo{ width:30px; height:30px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--teal), #0B4D43 70%);
    box-shadow: 0 0 14px rgba(43,224,196,0.55); }
  .side-nav{ display:flex; flex-direction:column; gap:22px; align-items:center; }
  .side-link{ width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    border-radius:10px; color: var(--text-muted); transition: background .15s,color .15s; }
  .side-link svg{ width:18px; height:18px; }
  .side-link:hover, .side-link.active{ background: var(--teal-dim); color: var(--teal); }
  .side-share-btn{ width:38px; height:38px; border-radius:10px; border:1px solid var(--panel-border);
    background:transparent; color:var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .side-share-btn:hover{ border-color: var(--teal); color: var(--teal); }
  .side-share-btn svg{ width:16px; height:16px; }
  @media (max-width:900px){ .sidebar{ display:none; } }

  .site-wrap{ margin-left: var(--sidebar-w); }
  @media (max-width:900px){ .site-wrap{ margin-left:0; } }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding: 20px 6vw; border-bottom: 1px solid var(--panel-border);
  }
  .logo{ display:flex; align-items:center; gap:8px; font-size:0.9rem; font-weight:700; }
  .logo-mark{ width:22px; height:22px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--teal), #0B4D43 70%);
    box-shadow: 0 0 14px rgba(43,224,196,0.55); }
  nav.links{ display:flex; gap:26px; font-size:0.78rem; color:var(--text-muted); }
  nav.links a:hover{ color: var(--teal); }
  @media (max-width:700px){ nav.links{ display:none; } }

  main{ max-width: 560px; margin: 0 auto; padding: 80px 6vw 100px; }
  .eyebrow{ font-size:0.65rem; color:var(--teal); text-transform:uppercase;
    background: var(--teal-dim); border:1px solid rgba(43,224,196,0.3);
    display:inline-block; padding:5px 12px; border-radius:100px; margin-bottom:22px; }
  main h1{ font-size: clamp(1.8rem, 3.6vw, 2.4rem); margin-bottom: 14px; }
  main > p{ color: var(--text-muted); font-size: 0.95rem; line-height: 1.7; margin-bottom: 34px; }

  .field{ margin-bottom: 18px; }
  .field label{ font-family:'Quicksand',sans-serif; font-size:0.82rem; font-weight:600; display:block; margin-bottom: 8px; color: var(--bone); }
  .field input, .field textarea{
    width: 100%; background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 0.9rem; outline: none; transition: border-color .15s;
  }
  .field input:focus, .field textarea:focus{ border-color: var(--teal); }
  .field textarea{ resize: vertical; min-height: 110px; }

  .btn-primary{
    background: var(--teal); color: #04231E; font-weight: 600; padding: 13px 26px;
    border-radius: 9px; font-size: 0.9rem; border: none; cursor: pointer;
    box-shadow: 0 0 26px rgba(43,224,196,0.32);
  }

  .contact-alt{ margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--panel-border); }
  .contact-alt p{ color: var(--text-muted); font-size: 0.88rem; margin-bottom: 6px; }
  .contact-alt a{ color: var(--teal); }

  footer{ padding: 30px 6vw; border-top: 1px solid var(--panel-border);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:14px;
    color: var(--text-muted); font-size:0.8rem; }
  .footer-links{ display:flex; gap:18px; }
  .footer-links a:hover{ color: var(--teal); }
</style>
</head>
<body>

<aside class="sidebar">
  <a href="index.html" class="side-logo" title="Home"></a>
  <nav class="side-nav">
    <a href="index.html" class="side-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    </a>
    <a href="index.html#tools" class="side-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    </a>
    <a href="about.html" class="side-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>
    </a>
    <a href="contact.html" class="side-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
    </a>
  </nav>
  <button class="side-share-btn" onclick="shareSite()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
  </button>
</aside>

<div class="site-wrap">
  <header>
    <a href="index.html" class="logo"><div class="logo-mark"></div>MEGLADON AI</a>
    <nav class="links">
      <a href="index.html#tools">Tools</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <span class="eyebrow mono">CONTACT</span>
    <h1>Get in touch.</h1>
    <p>Found a bug, have a tool idea, or want to ask something? Send a message below.</p>

    <form onsubmit="alert('Thanks! This form needs an email service connected — see the guide notes.'); return false;">
      <div class="field">
        <label for="name">Your name</label>
        <input type="text" id="name" placeholder="Ali Khan" required>
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="ali@example.com" required>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Tell us what's on your mind..." required></textarea>
      </div>
      <button type="submit" class="btn-primary">Send message</button>
    </form>

    <div class="contact-alt">
      <p>Prefer email directly?</p>
      <a href="mailto:hello@megladonai.com">hello@megladonai.com</a>
    </div>
  </main>

  <footer>
    <div>© 2026 Megladon AI. Built for speed.</div>
    <div class="footer-links mono">
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="privacy.html">Privacy</a>
    </div>
  </footer>
</div>

<script>
  async function shareSite(){
    const shareData = { title: 'Megladon AI', text: 'Free online tools — no sign-up needed.', url: location.origin + '/index.html' };
    if (navigator.share){ try{ await navigator.share(shareData); }catch(e){} }
    else { try{ await navigator.clipboard.writeText(shareData.url); alert('Link copied!'); }catch(e){} }
  }
</script>
</body>
</html>
